<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a4a"/>
      <stop offset="100%" stop-color="#14142a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  
  <text x="200" y="80" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Find the Next Number</text>
  
  <g transform="translate(70, 130)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#3f3f66" opacity="0.8"/>
    <text x="20" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
    
    <rect x="55" y="0" width="40" height="40" rx="8" fill="#3f3f66" opacity="0.8"/>
    <text x="75" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">4</text>
    
    <rect x="110" y="0" width="40" height="40" rx="8" fill="#3f3f66" opacity="0.8"/>
    <text x="130" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">16</text>
    
    <rect x="165" y="0" width="40" height="40" rx="8" fill="#3f3f66" opacity="0.8"/>
    <text x="185" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">64</text>
    
    <rect x="220" y="0" width="40" height="40" rx="8" fill="#8b5cf6" opacity="0.9"/>
    <text x="240" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">?</text>
  </g>
  
  <rect x="150" y="200" width="100" height="30" rx="15" fill="#3f3f66" opacity="0.5"/>
  <text x="200" y="220" font-family="sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Your Answer</text>
</svg>
