<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b2c6e"/>
      <stop offset="100%" stop-color="#1e1836"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  
  <text x="200" y="120" font-family="serif" font-size="36" font-weight="bold" fill="#3b82f6" text-anchor="middle" letter-spacing="4">PURPLE</text>
  
  <g transform="translate(65, 180)">
    <rect x="0" y="0" width="60" height="30" rx="6" fill="#ef4444"/>
    <text x="30" y="20" font-family="sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">RED</text>
    
    <rect x="70" y="0" width="60" height="30" rx="6" fill="#f97316"/>
    <text x="100" y="20" font-family="sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">ORANGE</text>
    
    <rect x="140" y="0" width="60" height="30" rx="6" fill="#22c55e"/>
    <text x="170" y="20" font-family="sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">GREEN</text>
    
    <rect x="210" y="0" width="60" height="30" rx="6" fill="#3b82f6"/>
    <text x="240" y="20" font-family="sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">BLUE</text>
  </g>
</svg>
