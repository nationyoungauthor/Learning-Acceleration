<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c416e"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <text x="200" y="60" font-family="sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Watch Carefully</text>
  <text x="200" y="80" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Memorize the pattern</text>
  
  <g transform="translate(110, 110)">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="#3f5a8a" opacity="0.8"/>
    <rect x="60" y="0" width="50" height="50" rx="8" fill="#3f5a8a" opacity="0.8"/>
    <rect x="120" y="0" width="50" height="50" rx="8" fill="#38bdf8" filter="url(#glow)"/>
    
    <rect x="0" y="60" width="50" height="50" rx="8" fill="#3f5a8a" opacity="0.8"/>
    <rect x="60" y="60" width="50" height="50" rx="8" fill="#3f5a8a" opacity="0.8"/>
    <rect x="120" y="60" width="50" height="50" rx="8" fill="#3f5a8a" opacity="0.8"/>
    
    <rect x="0" y="120" width="50" height="50" rx="8" fill="#3f5a8a" opacity="0.8"/>
    <rect x="60" y="120" width="50" height="50" rx="8" fill="#3f5a8a" opacity="0.8"/>
    <rect x="120" y="120" width="50" height="50" rx="8" fill="#3f5a8a" opacity="0.8"/>
  </g>
  
  <polygon points="360,20 370,40 350,40" fill="#fbbf24" transform="translate(0,-10) scale(0.6)"/>
  <circle cx="360" cy="25" r="8" fill="#fbbf24" />
</svg>
